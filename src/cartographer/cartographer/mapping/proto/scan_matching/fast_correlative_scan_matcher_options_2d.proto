syntax = "proto3";

package cartographer.mapping.scan_matching.proto;

message FastCorrelativeScanMatcherOptions2D {
  // Minimum linear search window in which the best possible scan alignment
  // will be found.
  double linear_search_window = 3;

  // Minimum angular search window in which the best possible scan alignment
  // will be found.
  double angular_search_window = 4;

  // Number of precomputed grids to use.
  int32 branch_and_bound_depth = 2;

  // If enabled, writes summary statistics of the lowest-resolution candidate
  // score distribution for each 2D fast correlative scan match.
  bool log_score_distribution_to_csv = 5;

  // CSV output path used when 'log_score_distribution_to_csv' is true.
  string score_distribution_csv_path = 6;
}
